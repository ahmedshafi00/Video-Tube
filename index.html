<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="TeleVid — Watch exclusive video content inside Telegram">
  <title>TeleVid — Telegram Video Platform</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Firebase (compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════════════════════ -->
<header class="app-header">
  <div class="header-logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="8" fill="#63b3ed" fill-opacity=".15"/>
      <path d="M10 8l12 6-12 6V8z" fill="#63b3ed"/>
    </svg>
    TeleVid
  </div>

  <div class="header-search">
    <input type="search" id="header-search-input" placeholder="Search videos…" autocomplete="off">
    <span class="search-icon">🔍</span>
  </div>

  <img class="header-avatar" id="header-avatar"
    src="https://ui-avatars.com/api/?name=U&background=63b3ed&color=0a0a0f&size=64"
    alt="Profile"
    onclick="renderPage('profile')">
</header>

<!-- ══════════════════════════════════════════════════════════
     PAGES
     ══════════════════════════════════════════════════════════ -->

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="main-content">
    <!-- Category filter -->
    <div class="category-scroll" id="category-pills">
      <button class="pill active" data-cat="all">🎬 All</button>
    </div>

    <!-- Trending banner -->
    <div class="section-header">
      <span class="section-title">🔥 Trending</span>
      <span class="section-more" onclick="doSearch('')">View all</span>
    </div>

    <!-- Video Grid -->
    <div class="video-grid" id="video-grid">
      <!-- Skeletons injected by JS -->
      <div class="skeleton skeleton-card"><div class="skeleton skeleton-thumb"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-meta"></div></div>
      <div class="skeleton skeleton-card"><div class="skeleton skeleton-thumb"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-meta"></div></div>
      <div class="skeleton skeleton-card"><div class="skeleton skeleton-thumb"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-meta"></div></div>
      <div class="skeleton skeleton-card"><div class="skeleton skeleton-thumb"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-meta"></div></div>
    </div>

    <!-- Infinite scroll sentinel -->
    <div class="load-more-sentinel" id="scroll-sentinel"></div>
  </div>
</div>

<!-- SEARCH PAGE -->
<div id="page-search" class="page">
  <div class="main-content search-page">
    <div class="search-box">
      <input type="search" id="search-input" placeholder="Search videos, tags…" autocomplete="off">
    </div>
    <!-- Category filter chips -->
    <div class="category-scroll" id="search-category-pills"></div>
    <div class="video-grid" id="search-results">
      <p class="text-muted text-center" style="grid-column:1/-1;padding:30px">
        Type to search…
      </p>
    </div>
  </div>
</div>

<!-- FAVORITES PAGE -->
<div id="page-favorites" class="page"></div>

<!-- PROFILE PAGE -->
<div id="page-profile" class="page"></div>

<!-- WATCH PAGE -->
<div id="page-watch" class="page"></div>

<!-- ══════════════════════════════════════════════════════════
     BOTTOM NAVIGATION
     ══════════════════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <button class="nav-item active" data-nav="home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Home
  </button>
  <button class="nav-item" data-nav="search">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    Search
  </button>
  <button class="nav-item" data-nav="favorites">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
    Favorites
  </button>
  <button class="nav-item" data-nav="profile">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    Profile
  </button>
</nav>

<!-- ══════════════════════════════════════════════════════════
     TOAST CONTAINER
     ══════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ══════════════════════════════════════════════════════════
     PWA INSTALL BANNER
     ══════════════════════════════════════════════════════════ -->
<div class="install-banner hidden" id="install-banner">
  <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
    <rect width="28" height="28" rx="8" fill="#63b3ed" fill-opacity=".2"/>
    <path d="M10 8l12 6-12 6V8z" fill="#63b3ed"/>
  </svg>
  <div class="install-text">
    <strong>Install TeleVid</strong>
    <span>Add to home screen for faster access</span>
  </div>
  <button class="btn btn-primary btn-sm" id="btn-install">Install</button>
  <button class="btn btn-glass btn-sm" id="btn-install-dismiss">✕</button>
</div>

<!-- ══════════════════════════════════════════════════════════
     SCRIPTS
     ══════════════════════════════════════════════════════════ -->
<script src="firebase.js"></script>
<script src="app.js"></script>

<!-- PWA Service Worker registration -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}

// Wire header search → search page
document.getElementById("header-search-input")?.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const q = e.target.value.trim();
    if (q.length < 1) return;
    renderPage("search");
    document.getElementById("search-input").value = q;
    doSearch(q);
  }
});
</script>

</body>
</html>
